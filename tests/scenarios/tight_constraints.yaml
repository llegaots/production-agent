name: tight_constraints
description: Narrow time windows that barely fit in one shift.
week_anchor: "2026-06-02"
user_request: "Schedule tight-window jobs without violating arrival times."
expect:
  status: approved
  max_iterations: 2
  max_high_severity_issues: 0
  require_all_jobs_accounted: true
use_llm_critic: false
use_agent: false
max_iterations: 4

crews:
  - id: crew-a
    name: Alpha
    skills: [residential]
    equipment_kinds: [ladder_28, van]
    base_lat: 45.5017
    base_lng: -73.5673
  - id: crew-b
    name: Bravo
    skills: [residential]
    equipment_kinds: [ladder_28, van]
    base_lat: 45.5020
    base_lng: -73.5670

equipment:
  - {id: eq-van-a, kind: van, label: Van A, quantity: 1}
  - {id: eq-van-b, kind: van, label: Van B, quantity: 1}
  - {id: eq-lad-1, kind: ladder_28, label: Ladder, quantity: 4}

crew_equipment:
  - {crew_id: crew-a, equipment_id: eq-van-a}
  - {crew_id: crew-a, equipment_id: eq-lad-1}
  - {crew_id: crew-b, equipment_id: eq-van-b}
  - {crew_id: crew-b, equipment_id: eq-lad-1}

clients:
  - {id: client-t1, name: Tight Client, contact_email: t1@test.com, contact_phone: "514-555-0100"}

jobs:
  - template: tight_window_job
    count: 8
    service_type: window_cleaning
    estimated_minutes: 35
    window_start: 60
    window_end: 420
    stagger_minutes: 45
    cluster_lat: 45.504
    cluster_lng: -73.566
    spread: 0.01
